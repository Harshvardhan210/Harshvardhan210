<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="100%" height="180">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
      
      .proj-title {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 15px;
        fill: #FFFFFF;
      }
      
      .proj-desc {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 500;
        font-size: 11px;
        fill: #94A3B8;
        line-height: 1.5;
      }
      
      .tag-text {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
        font-size: 10px;
        fill: #D8B4FE;
        dominant-baseline: middle;
        text-anchor: middle;
      }
      
      .card-border {
        stroke: #3B0764;
        stroke-width: 1.5px;
        transition: all 0.3s ease;
      }
      
      .card-group {
        transition: all 0.3s ease;
      }
      .card-group:hover .card-border {
        stroke: #BF5AF2;
        filter: drop-shadow(0 0 6px rgba(191, 90, 242, 0.4));
      }
      .card-group:hover {
        cursor: pointer;
      }
    </style>
  </defs>

  <g class="card-group">
    <!-- Card Body -->
    <rect x="2" y="2" width="376" height="176" rx="12" fill="#0c051a" class="card-border" />

    <!-- Icon Container Box (Left) -->
    <g transform="translate(18, 22)">
      <!-- Glowing background box for icon -->
      <rect x="0" y="0" width="40" height="40" rx="8" fill="#1e1135" stroke="#FF5F9E" stroke-width="1" />
      
      <!-- Medical / Heart / Report Icon -->
      <path d="M14,12 H26 M14,16 H22 M14,20 H26 M14,24 H20 M12,8 C12,6.89 12.89,6 14,6 H22 L28,12 V30 C28,31.11 27.11,32 26,32 H14 C12.89,32 12,31.11 12,30 Z" fill="none" stroke="#FF5F9E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" transform="translate(2, 2) scale(0.8)" />
    </g>

    <!-- Project Info (Right side) -->
    <!-- Title -->
    <text x="70" y="44" class="proj-title">Medical Report Visualization</text>
    
    <!-- Description (wrapped manually via y-coordinates) -->
    <text x="18" y="82" class="proj-desc">
      <tspan x="18" dy="0">Real-time patient report dashboard with role-based access,</tspan>
      <tspan x="18" dy="16">control and Firebase integration.</tspan>
    </text>

    <!-- Technology Tags at Bottom -->
    <g transform="translate(18, 132)">
      <!-- Tag 1: Python -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="55" height="20" rx="10" fill="#140718" stroke="#BF5AF2" stroke-width="1" />
        <text x="27.5" y="11" class="tag-text" fill="#D8B4FE">Python</text>
      </g>

      <!-- Tag 2: Streamlit -->
      <g transform="translate(62, 0)">
        <rect x="0" y="0" width="65" height="20" rx="10" fill="#041610" stroke="#34D399" stroke-width="1" />
        <text x="32.5" y="11" class="tag-text" fill="#A7F3D0">Streamlit</text>
      </g>

      <!-- Tag 3: Firebase -->
      <g transform="translate(134, 0)">
        <rect x="0" y="0" width="60" height="20" rx="10" fill="#03121d" stroke="#38BDF8" stroke-width="1" />
        <text x="30" y="11" class="tag-text" fill="#BAE6FD">Firebase</text>
      </g>
    </g>
  </g>
</svg>
