<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 170" width="100%" height="170">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&amp;family=Space+Grotesk:wght@500;700&amp;display=swap');
      
      .sec-title {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 14px;
        fill: #A78BFA;
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }
      
      .pill-text {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
        font-size: 12.5px;
        fill: #E2E8F0;
        dominant-baseline: middle;
      }
      
      .tech-pill {
        transition: all 0.3s ease;
      }
      .tech-pill:hover {
        cursor: pointer;
        filter: drop-shadow(0 0 6px currentColor);
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#07020d" rx="12" />

  <!-- Section Title -->
  <text x="25" y="35" class="sec-title">TECH STACK</text>

  <!-- Row 1: Java, Spring Boot, PostgreSQL, MySQL, Docker, React -->
  <g transform="translate(25, 55)">
    <!-- Java -->
    <g class="tech-pill" fill="#FF5F9E" transform="translate(0, 0)">
      <rect x="0" y="0" width="75" height="30" rx="15" fill="#140718" stroke="#FF5F9E" stroke-width="1.2" />
      <circle cx="15" cy="15" r="4.5" fill="#FF5F9E" />
      <text x="28" y="16" class="pill-text">Java</text>
    </g>

    <!-- Spring Boot -->
    <g class="tech-pill" fill="#34D399" transform="translate(87, 0)">
      <rect x="0" y="0" width="115" height="30" rx="15" fill="#041610" stroke="#34D399" stroke-width="1.2" />
      <circle cx="15" cy="15" r="4.5" fill="#34D399" />
      <text x="28" y="16" class="pill-text">Spring Boot</text>
    </g>

    <!-- PostgreSQL -->
    <g class="tech-pill" fill="#38BDF8" transform="translate(214, 0)">
      <rect x="0" y="0" width="115" height="30" rx="15" fill="#03121d" stroke="#38BDF8" stroke-width="1.2" />
      <circle cx="15" cy="15" r="4.5" fill="#38BDF8" />
      <text x="28" y="16" class="pill-text">PostgreSQL</text>
    </g>

    <!-- MySQL -->
    <g class="tech-pill" fill="#22D3EE" transform="translate(341, 0)">
      <rect x="0" y="0" width="85" height="30" rx="15" fill="#02141a" stroke="#22D3EE" stroke-width="1.2" />
      <circle cx="15" cy="15" r="4.5" fill="#22D3EE" />
      <text x="28" y="16" class="pill-text">MySQL</text>
    </g>

    <!-- Docker -->
    <g class="tech-pill" fill="#3B82F6" transform="translate(438, 0)">
      <rect x="0" y="0" width="85" height="30" rx="15" fill="#030e1f" stroke="#3B82F6" stroke-width="1.2" />
      <circle cx="15" cy="15" r="4.5" fill="#3B82F6" />
      <text x="28" y="16" class="pill-text">Docker</text>
    </g>

    <!-- React -->
    <g class="tech-pill" fill="#06B6D4" transform="translate(535, 0)">
      <rect x="0" y="0" width="80" height="30" rx="15" fill="#011317" stroke="#06B6D4" stroke-width="1.2" />
      <circle cx="15" cy="15" r="4.5" fill="#06B6D4" />
      <text x="28" y="16" class="pill-text">React</text>
    </g>
  </g>

  <!-- Row 2: Python, JavaScript, Git, Linux, Postman, IntelliJ IDEA -->
  <g transform="translate(25, 105)">
    <!-- Python -->
    <g class="tech-pill" fill="#60A5FA" transform="translate(15, 0)">
      <rect x="0" y="0" width="85" height="30" rx="15" fill="#06101f" stroke="#60A5FA" stroke-width="1.2" />
      <circle cx="15" cy="15" r="4.5" fill="#60A5FA" />
      <text x="28" y="16" class="pill-text">Python</text>
    </g>

    <!-- JavaScript -->
    <g class="tech-pill" fill="#FBBF24" transform="translate(112, 0)">
      <rect x="0" y="0" width="110" height="30" rx="15" fill="#1f1604" stroke="#FBBF24" stroke-width="1.2" />
      <circle cx="15" cy="15" r="4.5" fill="#FBBF24" />
      <text x="28" y="16" class="pill-text">JavaScript</text>
    </g>

    <!-- Git -->
    <g class="tech-pill" fill="#F87171" transform="translate(234, 0)">
      <rect x="0" y="0" width="65" height="30" rx="15" fill="#1f0707" stroke="#F87171" stroke-width="1.2" />
      <circle cx="15" cy="15" r="4.5" fill="#F87171" />
      <text x="28" y="16" class="pill-text">Git</text>
    </g>

    <!-- Linux -->
    <g class="tech-pill" fill="#FB923C" transform="translate(311, 0)">
      <rect x="0" y="0" width="75" height="30" rx="15" fill="#1f0e03" stroke="#FB923C" stroke-width="1.2" />
      <circle cx="15" cy="15" r="4.5" fill="#FB923C" />
      <text x="28" y="16" class="pill-text">Linux</text>
    </g>

    <!-- Postman -->
    <g class="tech-pill" fill="#F97316" transform="translate(398, 0)">
      <rect x="0" y="0" width="95" height="30" rx="15" fill="#1f0d03" stroke="#F97316" stroke-width="1.2" />
      <circle cx="15" cy="15" r="4.5" fill="#F97316" />
      <text x="28" y="16" class="pill-text">Postman</text>
    </g>

    <!-- IntelliJ IDEA -->
    <g class="tech-pill" fill="#C084FC" transform="translate(505, 0)">
      <rect x="0" y="0" width="125" height="30" rx="15" fill="#150524" stroke="#C084FC" stroke-width="1.2" />
      <circle cx="15" cy="15" r="4.5" fill="#C084FC" />
      <text x="28" y="16" class="pill-text">IntelliJ IDEA</text>
    </g>
  </g>
</svg>
