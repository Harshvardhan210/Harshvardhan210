<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="100%" height="180">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
      
      .proj-title {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 15px;
        fill: #FFFFFF;
      }
      
      .proj-desc {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 500;
        font-size: 11px;
        fill: #94A3B8;
        line-height: 1.5;
      }
      
      .tag-text {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
        font-size: 10px;
        fill: #D8B4FE;
        dominant-baseline: middle;
        text-anchor: middle;
      }
      
      .card-border {
        stroke: #3B0764;
        stroke-width: 1.5px;
        transition: all 0.3s ease;
      }
      
      .card-group {
        transition: all 0.3s ease;
      }
      .card-group:hover .card-border {
        stroke: #BF5AF2;
        filter: drop-shadow(0 0 6px rgba(191, 90, 242, 0.4));
      }
      .card-group:hover {
        cursor: pointer;
      }
    </style>
  </defs>

  <g class="card-group">
    <!-- Card Body -->
    <rect x="2" y="2" width="376" height="176" rx="12" fill="#0c051a" class="card-border" />

    <!-- Icon Container Box (Left) -->
    <g transform="translate(18, 22)">
      <!-- Glowing background box for icon -->
      <rect x="0" y="0" width="40" height="40" rx="8" fill="#1e1135" stroke="#34D399" stroke-width="1" />
      
      <!-- Finance / Dollar / Chart Icon -->
      <path d="M12,15 A6,6 0 0,1 24,15 A6,6 0 0,1 12,15 Z M18,8 V32 M14,12 H22 M14,24 H22" fill="none" stroke="#34D399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="translate(2, 2) scale(0.8)" />
      <!-- Inline Dollar Sign Vector -->
      <path d="M18,9 C16,9 14,10 14,12 C14,15 22,14 22,17 C22,19 20,20 18,20 C16,20 15,19 14,18 M18,6 V23" fill="none" stroke="#34D399" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" transform="translate(2, 2) scale(0.8)" />
    </g>

    <!-- Project Info (Right side) -->
    <!-- Title -->
    <text x="70" y="44" class="proj-title">Cash-Flow</text>
    
    <!-- Description (wrapped manually) -->
    <text x="18" y="82" class="proj-desc">
      <tspan x="18" dy="0">Full-stack expense tracker with budget visualization and</tspan>
      <tspan x="18" dy="16">spending insights.</tspan>
    </text>

    <!-- Technology Tags at Bottom -->
    <g transform="translate(18, 132)">
      <!-- Tag 1: Spring Boot -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="75" height="20" rx="10" fill="#140718" stroke="#BF5AF2" stroke-width="1" />
        <text x="37.5" y="11" class="tag-text" fill="#D8B4FE">Spring Boot</text>
      </g>

      <!-- Tag 2: MySQL -->
      <g transform="translate(82, 0)">
        <rect x="0" y="0" width="55" height="20" rx="10" fill="#02141a" stroke="#22D3EE" stroke-width="1" />
        <text x="27.5" y="11" class="tag-text" fill="#A5F3FC">MySQL</text>
      </g>

      <!-- Tag 3: JS -->
      <g transform="translate(144, 0)">
        <rect x="0" y="0" width="35" height="20" rx="10" fill="#1f1604" stroke="#FBBF24" stroke-width="1" />
        <text x="17.5" y="11" class="tag-text" fill="#FDE68A">JS</text>
      </g>
    </g>
  </g>
</svg>
