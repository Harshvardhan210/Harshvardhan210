<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="100%" height="320">
  <defs>
    <!-- Fonts -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&amp;family=Space+Grotesk:wght@500;700&amp;display=swap');
      
      .sun-gradient { fill: url(#synthwave-sun); }
      .title {
        font-family: 'Outfit', sans-serif;
        font-weight: 800;
        font-size: 38px;
        fill: url(#pink-glow);
        text-anchor: middle;
        letter-spacing: 0.5px;
      }
      .subtitle {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 13px;
        fill: #D946EF;
        text-anchor: middle;
        letter-spacing: 4px;
      }
      .motto {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 500;
        font-size: 14px;
        fill: #A78BFA;
        text-anchor: middle;
        letter-spacing: 1px;
      }
      
      .badge-text {
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        font-size: 11px;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      
      /* Subtle hover/glow effects */
      .badge {
        transition: all 0.3s ease;
      }
      .badge:hover {
        filter: drop-shadow(0 0 8px currentColor);
        cursor: pointer;
      }
    </style>

    <!-- Gradients -->
    <linearGradient id="synthwave-sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="50%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#3B0764" />
    </linearGradient>

    <linearGradient id="pink-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5F9E" />
      <stop offset="50%" stop-color="#BF5AF2" />
      <stop offset="100%" stop-color="#7DD3FC" />
    </linearGradient>
    
    <!-- Neon Glow Filters -->
    <filter id="neon-glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background (matching github dark mode canvas but self-contained) -->
  <rect width="100%" height="100%" fill="#07020d" rx="12" />

  <!-- Retro Synthwave Sun (with horizontal stripe cutouts) -->
  <g transform="translate(400, 65)">
    <!-- Sun Core -->
    <mask id="sun-stripes">
      <rect x="-60" y="-60" width="120" height="120" fill="white" />
      <!-- Horizontal lines to mask out -->
      <rect x="-60" y="5" width="120" height="3" fill="black" />
      <rect x="-60" y="14" width="120" height="4" fill="black" />
      <rect x="-60" y="24" width="120" height="5" fill="black" />
      <rect x="-60" y="35" width="120" height="6" fill="black" />
      <rect x="-60" y="47" width="120" height="8" fill="black" />
    </mask>
    <circle r="48" class="sun-gradient" mask="url(#sun-stripes)" />
  </g>

  <!-- Profile Typography -->
  <text x="400" y="152" class="title">Harshvardhan Tiwari</text>
  <text x="400" y="180" class="subtitle">JAVA BACKEND DEVELOPER</text>
  
  <text x="400" y="210" class="motto">Clean Code. Clean Arc.</text>

  <!-- Badges Grid (Pills with colored glow borders) -->
  <!-- 5 Badges centered: Spring Boot, 250+ LeetCode, Mastek Intern, PostgreSQL, Docker -->
  <g transform="translate(400, 248)">
    <!-- Spring Boot (Purple) -->
    <g class="badge" transform="translate(-255, 0)">
      <rect x="0" y="0" width="95" height="24" rx="12" fill="#140727" stroke="#BF5AF2" stroke-width="1.5" />
      <text x="47.5" y="13" class="badge-text" fill="#D8B4FE">Spring Boot</text>
    </g>

    <!-- LeetCode (Pink) -->
    <g class="badge" transform="translate(-150, 0)">
      <rect x="0" y="0" width="105" height="24" rx="12" fill="#180415" stroke="#FF5F9E" stroke-width="1.5" />
      <text x="52.5" y="13" class="badge-text" fill="#FBCFE8">250+ LeetCode</text>
    </g>

    <!-- Mastek Intern (Orange/Yellow) -->
    <g class="badge" transform="translate(-35, 0)">
      <rect x="0" y="0" width="100" height="24" rx="12" fill="#1a0c02" stroke="#F59E0B" stroke-width="1.5" />
      <text x="50" y="13" class="badge-text" fill="#FDE68A">Mastek Intern</text>
    </g>

    <!-- PostgreSQL (Blue) -->
    <g class="badge" transform="translate(75, 0)">
      <rect x="0" y="0" width="95" height="24" rx="12" fill="#031122" stroke="#38BDF8" stroke-width="1.5" />
      <text x="47.5" y="13" class="badge-text" fill="#BAE6FD">PostgreSQL</text>
    </g>

    <!-- Docker (Red/Pink) -->
    <g class="badge" transform="translate(180, 0)">
      <rect x="0" y="0" width="75" height="24" rx="12" fill="#18030f" stroke="#F43F5E" stroke-width="1.5" />
      <text x="37.5" y="13" class="badge-text" fill="#FECDD3">Docker</text>
    </g>
  </g>

  <!-- Bottom Elegant Divider Line -->
  <line x1="100" y1="295" x2="700" y2="295" stroke="#3B0764" stroke-width="1.5" opacity="0.6" />
</svg>
