<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="100%" height="320">
  <defs>
    <!-- Fonts -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&amp;family=Space+Grotesk:wght@500;700&amp;display=swap');
      
      .sphere-gradient { fill: url(#cyber-sphere); }
      .title {
        font-family: 'Outfit', sans-serif;
        font-weight: 800;
        font-size: 38px;
        fill: url(#cyan-glow-grad);
        text-anchor: middle;
        letter-spacing: 0.5px;
      }
      .subtitle {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 13px;
        fill: #00F2FE;
        text-anchor: middle;
        letter-spacing: 4px;
      }
      .motto {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 500;
        font-size: 14px;
        fill: #94A3B8;
        text-anchor: middle;
        letter-spacing: 1px;
      }
      
      .badge-text {
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        font-size: 11px;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      
      .badge {
        transition: all 0.3s ease;
      }
      .badge:hover {
        filter: drop-shadow(0 0 8px currentColor);
        cursor: pointer;
      }
    </style>

    <!-- Cyber Spherical Gradient -->
    <radialGradient id="cyber-sphere" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#05070C" />
    </radialGradient>

    <linearGradient id="cyan-glow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
  </defs>

  <!-- Cosmic Dark Background -->
  <rect width="100%" height="100%" fill="#05070c" rx="12" />

  <!-- High-Tech Geometric Sphere Header Logo -->
  <g transform="translate(400, 65)">
    <!-- Tech Grid Circle Background -->
    <circle r="48" fill="none" stroke="#1E293B" stroke-dasharray="4 2" stroke-width="1" />
    <circle r="40" class="sphere-gradient" opacity="0.85" />
    <!-- Outer accent rings -->
    <circle r="44" fill="none" stroke="#00F2FE" stroke-width="1" opacity="0.3" />
    <circle r="48" fill="none" stroke="#3B82F6" stroke-width="1.2" opacity="0.5" stroke-dasharray="20 10" />
  </g>

  <!-- Typography -->
  <text x="400" y="152" class="title">Harshvardhan Tiwari</text>
  <text x="400" y="180" class="subtitle">JAVA BACKEND DEVELOPER</text>
  
  <text x="400" y="210" class="motto">Clean Code. Clean Arc.</text>

  <!-- High-Tech Slate Badges -->
  <g transform="translate(400, 248)">
    <!-- Spring Boot (Teal/Green) -->
    <g class="badge" transform="translate(-255, 0)">
      <rect x="0" y="0" width="95" height="24" rx="12" fill="#061814" stroke="#10B981" stroke-width="1.2" />
      <text x="47.5" y="13" class="badge-text" fill="#A7F3D0">Spring Boot</text>
    </g>

    <!-- LeetCode (Cyan) -->
    <g class="badge" transform="translate(-150, 0)">
      <rect x="0" y="0" width="105" height="24" rx="12" fill="#02141a" stroke="#00F2FE" stroke-width="1.2" />
      <text x="52.5" y="13" class="badge-text" fill="#E0F2FE">250+ LeetCode</text>
    </g>

    <!-- Mastek Intern (Blue) -->
    <g class="badge" transform="translate(-35, 0)">
      <rect x="0" y="0" width="100" height="24" rx="12" fill="#030e1f" stroke="#3B82F6" stroke-width="1.2" />
      <text x="50" y="13" class="badge-text" fill="#DBEAFE">Mastek Intern</text>
    </g>

    <!-- PostgreSQL (Slate) -->
    <g class="badge" transform="translate(75, 0)">
      <rect x="0" y="0" width="95" height="24" rx="12" fill="#0f172a" stroke="#64748B" stroke-width="1.2" />
      <text x="47.5" y="13" class="badge-text" fill="#E2E8F0">PostgreSQL</text>
    </g>

    <!-- Docker (Cyan-Blue) -->
    <g class="badge" transform="translate(180, 0)">
      <rect x="0" y="0" width="75" height="24" rx="12" fill="#021122" stroke="#0EA5E9" stroke-width="1.2" />
      <text x="37.5" y="13" class="badge-text" fill="#E0F2FE">Docker</text>
    </g>
  </g>

  <!-- Bottom Divider Line -->
  <line x1="100" y1="295" x2="700" y2="295" stroke="#1E293B" stroke-width="1" opacity="0.6" />
</svg>
