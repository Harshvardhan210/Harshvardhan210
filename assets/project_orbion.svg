<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="100%" height="180">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
      
      .proj-title {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 15px;
        fill: #FFFFFF;
      }
      
      .proj-desc {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 500;
        font-size: 11px;
        fill: #94A3B8;
        line-height: 1.5;
      }
      
      .tag-text {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
        font-size: 10px;
        fill: #00F2FE;
        dominant-baseline: middle;
        text-anchor: middle;
      }
      
      .card-border {
        stroke: #1E293B;
        stroke-width: 1.5px;
        transition: all 0.3s ease;
      }
      
      .card-group {
        transition: all 0.3s ease;
      }
      .card-group:hover .card-border {
        stroke: #00F2FE;
        filter: drop-shadow(0 0 6px rgba(0, 242, 254, 0.4));
      }
      .card-group:hover {
        cursor: pointer;
      }
    </style>
  </defs>

  <g class="card-group">
    <!-- Card Body -->
    <rect x="2" y="2" width="376" height="176" rx="12" fill="#090d16" class="card-border" />

    <!-- Icon Container Box -->
    <g transform="translate(18, 22)">
      <rect x="0" y="0" width="40" height="40" rx="8" fill="#05070c" stroke="#3B82F6" stroke-width="1" />
      <path d="M21,12 H15 M18,9 V15 M27,15 H29 M30,12 H28 M8,14 C8,19 12,28 17,28 H23 C28,28 32,19 32,14 C32,9 28,6 23,6 H17 C12,6 8,9 8,14 Z" fill="none" stroke="#3B82F6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" transform="translate(2, 2) scale(0.8)" />
      <circle cx="27" cy="12" r="1.5" fill="#3B82F6" transform="translate(2, 2) scale(0.8)" />
      <circle cx="24" cy="15" r="1.5" fill="#3B82F6" transform="translate(2, 2) scale(0.8)" />
    </g>

    <!-- Project Info -->
    <text x="70" y="44" class="proj-title">Orbion — Ball Adventure</text>
    
    <text x="18" y="82" class="proj-desc">
      <tspan x="18" dy="0">Physics-based 3D puzzle game built in Unity with smooth</tspan>
      <tspan x="18" dy="16">gameplay and logic challenges.</tspan>
    </text>

    <!-- Technology Tags -->
    <g transform="translate(18, 132)">
      <!-- Tag 1: Unity -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="45" height="20" rx="10" fill="#030e1f" stroke="#3B82F6" stroke-width="1" />
        <text x="22.5" y="11" class="tag-text" fill="#DBEAFE">Unity</text>
      </g>

      <!-- Tag 2: C# -->
      <g transform="translate(52, 0)">
        <rect x="0" y="0" width="35" height="20" rx="10" fill="#03121d" stroke="#38BDF8" stroke-width="1" />
        <text x="17.5" y="11" class="tag-text" fill="#E0F2FE">C#</text>
      </g>

      <!-- Tag 3: ASP.NET -->
      <g transform="translate(94, 0)">
        <rect x="0" y="0" width="60" height="20" rx="10" fill="#1f1604" stroke="#FBBF24" stroke-width="1" />
        <text x="30" y="11" class="tag-text" fill="#FDE68A">ASP.NET</text>
      </g>
    </g>
  </g>
</svg>
