<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 370" width="100%" height="370">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&amp;family=Outfit:wght@600;700&amp;display=swap');
      
      .sec-title {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 14px;
        fill: #A78BFA;
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }
      
      .code-font {
        font-family: 'Fira Code', 'Courier New', monospace;
        font-size: 13.5px;
        line-height: 1.6;
      }
      
      /* Synthwave syntax coloring */
      .keyword { fill: #E06BB8; font-weight: 600; }
      .class-name { fill: #FBBF24; font-weight: 600; }
      .var-name { fill: #38BDF8; }
      .string { fill: #34D399; }
      .number { fill: #FB7185; }
      .comment { fill: #6B7280; font-style: italic; }
      .punctuation { fill: #E5E7EB; }
      
      .window-border {
        stroke: #3B0764;
        stroke-width: 1.5px;
      }
    </style>
    
    <filter id="subtle-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#07020d" rx="12" />

  <!-- Section Title -->
  <text x="25" y="35" class="sec-title">ABOUT ME</text>

  <!-- IDE Window Group -->
  <g transform="translate(25, 55)">
    <!-- Window Body Background -->
    <rect width="750" height="285" rx="8" fill="#0c051a" class="window-border" />
    
    <!-- Editor Top Tab Bar Header -->
    <path d="M 0,8 A 8,8 0 0 1 8,0 L 742,0 A 8,8 0 0 1 750,8 L 750,30 L 0,30 Z" fill="#080312" />
    
    <!-- Tab Indicator: Harshvardhan.java -->
    <g transform="translate(15, 0)">
      <!-- Tab BG (Active) -->
      <path d="M 0,30 L 5,5 A 4,4 0 0 1 9,1 L 146,1 A 4,4 0 0 1 150,5 L 155,30 Z" fill="#0c051a" />
      
      <!-- Tab Circle Indicator (Pink/Magenta dot) -->
      <circle cx="20" cy="16" r="4.5" fill="#FF5F9E" />
      
      <!-- Tab Text -->
      <text x="32" y="20" font-family="'Fira Code', monospace" font-size="11.5" fill="#D8B4FE">Harshvardhan.java</text>
    </g>
    
    <!-- Bottom line of tab header -->
    <line x1="0" y1="30" x2="750" y2="30" stroke="#1E1135" stroke-width="1" />
    
    <!-- Java Code Editor Content -->
    <g transform="translate(25, 52)" class="code-font">
      <!-- Line 1: public class Harshvardhan { -->
      <text x="0" y="15">
        <tspan class="keyword">public class</tspan> <tspan class="class-name">Harshvardhan</tspan> <tspan class="punctuation">{</tspan>
      </text>

      <!-- Line 2: String name = "Harshvardhan Tiwari"; -->
      <text x="20" y="42">
        <tspan class="keyword">String</tspan> <tspan class="var-name">name</tspan> <tspan class="punctuation">=</tspan> <tspan class="string">"Harshvardhan Tiwari"</tspan><tspan class="punctuation">;</tspan>
      </text>

      <!-- Line 3: String role = "Backend Developer"; -->
      <text x="20" y="69">
        <tspan class="keyword">String</tspan> <tspan class="var-name">role</tspan> <tspan class="punctuation">=</tspan> <tspan class="string">"Backend Developer"</tspan><tspan class="punctuation">;</tspan>
      </text>

      <!-- Line 4: String company = "Mastek (Intern)"; -->
      <text x="20" y="96">
        <tspan class="keyword">String</tspan> <tspan class="var-name">company</tspan> <tspan class="punctuation">=</tspan> <tspan class="string">"Mastek (Intern)"</tspan><tspan class="punctuation">;</tspan>
      </text>

      <!-- Line 5: String[] stack = {"Java", "Spring Boot", "PostgreSQL", "Docker"}; -->
      <text x="20" y="123">
        <tspan class="keyword">String</tspan><tspan class="punctuation">[]</tspan> <tspan class="var-name">stack</tspan> <tspan class="punctuation">=</tspan> <tspan class="punctuation">{</tspan><tspan class="string">"Java"</tspan><tspan class="punctuation">,</tspan> <tspan class="string">"Spring Boot"</tspan><tspan class="punctuation">,</tspan> <tspan class="string">"PostgreSQL"</tspan><tspan class="punctuation">,</tspan> <tspan class="string">"Docker"</tspan><tspan class="punctuation">};</tspan>
      </text>

      <!-- Line 6: int dsaSolved = 250; -->
      <text x="20" y="150">
        <tspan class="keyword">int</tspan> <tspan class="var-name">dsaSolved</tspan> <tspan class="punctuation">=</tspan> <tspan class="number">250</tspan><tspan class="punctuation">;</tspan>
      </text>

      <!-- Line 7: String motto = "Build scalable. Write clean. Ship fast."; -->
      <text x="20" y="177">
        <tspan class="keyword">String</tspan> <tspan class="var-name">motto</tspan> <tspan class="punctuation">=</tspan> <tspan class="string">"Build scalable. Write clean. Ship fast."</tspan><tspan class="punctuation">;</tspan>
      </text>
      
      <!-- Line 8: // Always leveling up in system design & architecture -->
      <text x="20" y="210" class="comment">
        // Always leveling up in system design &amp; architecture
      </text>

      <!-- Line 9: } -->
      <text x="0" y="240" class="punctuation">}</text>
    </g>
  </g>
</svg>
