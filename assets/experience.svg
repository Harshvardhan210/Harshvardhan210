<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
      
      .sec-title {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 14px;
        fill: #A78BFA;
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }
      
      .role-title {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 14.5px;
        fill: #FFFFFF;
      }
      
      .timeline {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
        font-size: 10px;
        fill: #FF5F9E;
        letter-spacing: 0.5px;
      }
      
      .bullet-text {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 500;
        font-size: 12px;
        fill: #94A3B8;
      }
      
      .card-border {
        stroke: #3B0764;
        stroke-width: 1.5px;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#07020d" rx="12" />

  <!-- Section Title -->
  <text x="25" y="35" class="sec-title">WORK EXPERIENCE</text>

  <!-- Experience Card -->
  <g transform="translate(25, 55)">
    <!-- Card Frame -->
    <rect width="750" height="120" rx="8" fill="#0c051a" class="card-border" />
    
    <!-- Title: Application Developer Intern — Mastek -->
    <text x="20" y="30" class="role-title">Application Developer Intern — Mastek</text>
    
    <!-- Timeline: JAN 2024 – JUN 2024 -->
    <text x="20" y="47" class="timeline">JAN 2024 – JUN 2024</text>
    
    <!-- Bullets -->
    <g transform="translate(20, 70)">
      <!-- Bullet 1 -->
      <circle cx="5" cy="-4" r="2.5" fill="#BF5AF2" />
      <text x="18" y="0" class="bullet-text">Developed &amp; maintained Java-based applications improving scalability</text>
      
      <!-- Bullet 2 -->
      <circle cx="5" cy="16" r="2.5" fill="#BF5AF2" />
      <text x="18" y="20" class="bullet-text">Integrated RESTful APIs enabling high-performance communication</text>
      
      <!-- Bullet 3 -->
      <circle cx="5" cy="36" r="2.5" fill="#BF5AF2" />
      <text x="18" y="40" class="bullet-text">Contributed to Agile sprints, testing and documentation</text>
    </g>
  </g>
</svg>
