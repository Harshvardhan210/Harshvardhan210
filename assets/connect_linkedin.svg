<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 32" width="110" height="32">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&amp;display=swap');
      .btn-text {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
        font-size: 11.5px;
        fill: #FFFFFF;
        dominant-baseline: middle;
      }
      .btn-group {
        transition: all 0.3s ease;
      }
      .btn-group:hover {
        cursor: pointer;
        filter: drop-shadow(0 0 5px #3B82F6);
      }
    </style>
  </defs>
  <g class="btn-group">
    <rect x="1" y="1" width="108" height="30" rx="15" fill="#030e1f" stroke="#3B82F6" stroke-width="1.2" />
    <circle cx="16" cy="16" r="4.5" fill="#3B82F6" />
    <text x="28" y="17" class="btn-text">LinkedIn</text>
  </g>
</svg>
