<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 170" width="100%" height="170">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
      
      .sec-title {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 14px;
        fill: #64748B;
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }
      
      .cert-title {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 14.5px;
        fill: #FFFFFF;
      }
      
      .cert-desc {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 500;
        font-size: 11px;
        fill: #94A3B8;
      }
      
      .cert-link {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
        font-size: 11px;
        fill: #00F2FE;
        text-decoration: none;
      }
      
      .card-border {
        stroke: #1E293B;
        stroke-width: 1.5px;
        transition: all 0.3s ease;
      }
      
      .card-group {
        transition: all 0.3s ease;
      }
      .card-group:hover .card-border {
        stroke: #00F2FE;
        filter: drop-shadow(0 0 6px rgba(0, 242, 254, 0.3));
      }
      .card-group:hover {
        cursor: pointer;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#05070c" rx="12" />

  <!-- Section Title -->
  <text x="25" y="35" class="sec-title">CERTIFICATION</text>

  <!-- Certification Card Group -->
  <g transform="translate(25, 55)" class="card-group">
    <!-- Card Frame -->
    <rect width="750" height="90" rx="8" fill="#090d16" class="card-border" />
    
    <!-- Icon Box -->
    <g transform="translate(18, 15)">
      <rect x="0" y="0" width="60" height="60" rx="8" fill="#05070c" stroke="#3B82F6" stroke-width="1.2" />
      <path d="M12,18 L30,9 L48,18 L30,27 Z M18,21 V33 C18,36 24,39 30,39 C36,39 42,36 42,33 V21 M48,18 V30" fill="none" stroke="#3B82F6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, 0)" />
    </g>

    <!-- Info -->
    <text x="95" y="32" class="cert-title">Spring Framework for Java Development</text>
    <text x="95" y="50" class="cert-desc">Coursera — Spring Boot, REST APIs, Data JPA</text>
    
    <text x="95" y="69" class="cert-link">View Certificate ↗</text>
  </g>
</svg>
